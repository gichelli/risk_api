apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "platform.fullname" . }}
  labels:
    app: platform

spec:
  replicas: {{ .Values.replicaCount }}

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: platform

  template:
    metadata:
      labels:
        app: platform

    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true

      containers:
        - name: platform

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.ENVIRONMENT | quote }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
{{ toYaml .Values.resources | indent 12 }}