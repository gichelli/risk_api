#################################
# Docker Build + Scan
#################################

  docker-security:

    name: Docker Security Scan
    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    #
    # Build image only
    #
    - name: Docker build validation
      run: |

        docker build \
          -t risk-api:test .


    #
    # Container vulnerability scan
    #
    - name: Trivy container scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: risk-api:test
        format: table
        vuln-type: os,library
        severity: CRITICAL,HIGH
        exit-code: 0



#################################
# Docker Smoke Test
#################################

  smoke-test:

    name: Application Smoke Test

    needs:
      - docker-security

    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Build image

      run: |

        docker build \
          -t risk-api:test .


    - name: Run container

      run: |

        docker run -d \
          --name risk-api-test \
          -p 8080:8080 \
          risk-api:test


        sleep 5


    - name: Health check

      run: |

        curl --fail \
          http://localhost:8080/health


    - name: Cleanup

      run: |

        docker stop risk-api-test