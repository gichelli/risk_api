name: CI Pipeline

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: read
  id-token: write



jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd app/risk_api
        pip install -e ".[dev]"


    - name: Run tests
      run: |
        make test


    - name: Run lint
      run: |
        make lint


    - name: Dependency security scan
      run: |
        pip install pip-audit
        pip-audit


    - name: Secret scanning
      uses: gitleaks/gitleaks-action@v2

  build-and-push:

    needs: validate

    if: github.ref == 'refs/heads/master'

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::037229268993:role/github-actions-ecr-role
        aws-region: us-east-1


    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: 037229268993.dkr.ecr.us-east-1.amazonaws.com
        IMAGE_NAME: risk-api
      run: |
        docker build \
          -t $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }} \
          app/risk_api

        docker push \
          $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }}