name: CI Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main


jobs:

  test-and-build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd app/risk_api
        pip install -e ".[dev]"


    - name: Run tests
      run: |
        make test


    - name: Run lint
      run: |
        make lint


    - name: Build Docker image
      run: |
        make docker-build