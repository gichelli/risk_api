name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - "feature/**"


permissions:
  contents: read
  security-events: write


#################################
# Unit Tests + Lint
#################################

jobs:

  test:

    name: Unit Tests
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        make install
        make install-test

    - name: Run tests
      run: |
        make test

    
    - name: Test coverage
      run: |
        pytest tests/unit \
          --cov=src \
          --cov-report=term-missing


    - name: Run lint
      run: |
        make lint



