name: Release Pipeline

on:
  push:
    branches:
      - master


permissions:
  contents: write
  id-token: write


jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}


    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        IMAGE_NAME: risk-api

      run: |
        docker build \
          -t $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }} \
          .

        docker push \
          $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }}
    
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
        owner: ${{ vars.GITOPS_OWNER }}


    - name: Notify GitOps repository
      uses: actions/github-script@v7
      env:
        GITOPS_OWNER: ${{ vars.GITOPS_OWNER }}
        GITOPS_REPO: ${{ vars.GITOPS_REPO }}

      with:
        github-token: ${{ steps.app-token.outputs.token }}

        script: |
          await github.rest.repos.createDispatchEvent({
            owner: process.env.GITOPS_OWNER,
            repo: process.env.GITOPS_REPO,
            event_type: "new-image",
            client_payload: {
              image_tag: "${{ github.sha }}"
            }
          });